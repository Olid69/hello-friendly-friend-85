name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Capacitor CLI
        run: bun run cap --version

      - name: Build web bundle
        run: bun run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bun run cap add android
          fi

      - name: Sync Capacitor
        run: bun run cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp android/app/build/outputs/apk/debug/app-debug.apk artifact/sonora.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonora-apk
          path: artifact/sonora.apk

      - name: Publish to Release (rolling "latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Sonora latest APK
          files: artifact/sonora.apk
          make_latest: "true"
