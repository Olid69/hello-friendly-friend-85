name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK (use preinstalled)
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Capacitor CLI
        run: |
          node --version
          bun --version
          bun run cap --version

      - name: Build web bundle
        run: bun run build

      - name: Inspect build output
        run: |
          echo "=== dist tree ==="
          find dist -maxdepth 3 -type d || true
          echo "=== dist/client (if exists) ==="
          ls -la dist/client || true
          echo "=== dist/client/assets (if exists) ==="
          ls dist/client/assets 2>/dev/null | head -20 || true

      - name: Generate Capacitor SPA shell (dist/client/index.html)
        run: node scripts/build-capacitor-shell.mjs

      - name: Verify web bundle for APK
        run: |
          if [ ! -f "dist/client/index.html" ]; then
            echo "::error::Capacitor webDir is dist/client, but dist/client/index.html was not created."
            echo "dist contents:"
            ls -la dist || true
            echo "dist/client contents:"
            ls -la dist/client || true
            exit 1
          fi

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bun run cap add android
          fi

      - name: Apply Android native overrides (popups + background audio)
        run: |
          MAIN_DIR="android/app/src/main/java/app/sonora/personal"
          mkdir -p "$MAIN_DIR"
          cp android-overrides/MainActivity.java "$MAIN_DIR/MainActivity.java"
          cp android-overrides/SonoraAudioService.java "$MAIN_DIR/SonoraAudioService.java"
          echo "MainActivity.java installed:"
          head -5 "$MAIN_DIR/MainActivity.java"

      - name: Sync Capacitor
        run: bun run cap sync android

      - name: Patch Android manifest for background playback
        run: |
          MAIN_DIR="android/app/src/main/java/app/sonora/personal"
          mkdir -p "$MAIN_DIR"
          cp android-overrides/MainActivity.java "$MAIN_DIR/MainActivity.java"
          cp android-overrides/SonoraAudioService.java "$MAIN_DIR/SonoraAudioService.java"
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          permissions = [
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />',
              '<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />',
              '<uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />',
          ]
          for permission in permissions:
              if permission not in text:
                  text = text.replace("<application", f"{permission}\n\n    <application", 1)

          service = '''\n        <service\n            android:name=".SonoraAudioService"\n            android:exported="false"\n            android:foregroundServiceType="mediaPlayback" />\n'''
          if 'android:name=".SonoraAudioService"' not in text:
              text = text.replace("    </application>", service + "    </application>", 1)

          manifest.write_text(text)
          PY
          grep -n "SonoraAudioService\|FOREGROUND_SERVICE" android/app/src/main/AndroidManifest.xml

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Configure universal APK (both ABIs, no resource shrinking)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          text = p.read_text()
          if 'androidx.media3:media3-exoplayer' not in text:
              text = text.replace(
                  "dependencies {",
                  "dependencies {\n    implementation 'androidx.media3:media3-exoplayer:1.8.0'\n    implementation 'androidx.media3:media3-datasource:1.8.0'",
                  1,
              )
          # Keep all ABIs (universal fat APK) — bigger install but works on every device.
          if "abiFilters" not in text:
              text = text.replace(
                  "defaultConfig {",
                  "defaultConfig {\n        ndk {\n            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'\n        }",
                  1,
              )
          # Do not shrink resources — bundled fonts/assets must ship.
          text = text.replace("shrinkResources true", "shrinkResources false")
          p.write_text(text)
          print(text[:600])
          PY

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p artifact
          APK_PATH="$(find android/app/build/outputs/apk -name 'app-*universal*.apk' -o -name 'app-debug.apk' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find android/app/build/outputs/apk -name '*.apk' | sort | head -n 1)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "::error::Gradle finished but no APK was found."
            find android/app/build/outputs -maxdepth 5 -type f || true
            exit 1
          fi
          cp "$APK_PATH" artifact/sonora.apk
          ls -lh artifact/sonora.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonora-apk
          path: artifact/sonora.apk

      - name: Publish to Release (rolling "latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Sonora latest APK
          files: artifact/sonora.apk
          make_latest: "true"
